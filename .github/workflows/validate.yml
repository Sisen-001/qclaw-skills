name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all skills have SKILL.md
        run: |
          MISSING=""
          for category in finance content growth productivity utilities; do
            for skill in ~/.qclaw/workspace/qclaw-skills/$category/*/; do
              if [ ! -f "$skill/SKILL.md" ]; then
                MISSING="$MISSING $(basename $skill)"
              fi
            done
          done
          if [ -n "$MISSING" ]; then
            echo "❌ Skills without SKILL.md:$MISSING"
            exit 1
          fi
          echo "✅ All skills have SKILL.md"

      - name: Check for hardcoded secrets
        run: |
          SECRETS=$(grep -r "password\|secret\|api_key\|API_KEY" --include="*.md" --include="*.py" --include="*.sh" --include="*.js" . 2>/dev/null | grep -v "node_modules" | grep -v ".git" | grep -v "example" | grep -v "README" | wc -l)
          if [ "$SECRETS" -gt 0 ]; then
            echo "⚠️  Found potential secrets (review needed)"
          fi

      - name: List all skills
        run: |
          echo "## 📦 Skills in this repository"
          for category in finance content growth productivity utilities; do
            echo ""
            echo "### $category ($(ls ~/.qclaw/workspace/qclaw-skills/$category/ 2>/dev/null | wc -l | tr -d ' ') skills)"
            for skill in ~/.qclaw/workspace/qclaw-skills/$category/*/; do
              echo "- $(basename $skill)"
            done
          done
